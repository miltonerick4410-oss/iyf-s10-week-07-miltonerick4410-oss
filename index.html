<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    <h1>My To-Do List</h1>
    <p class="subtitle">Built with DOM manipulation & event listeners</p>

    <div class="stats">
      <span>Total: <b id="total">0</b></span>
      <span>Active: <b id="active">0</b></span>
      <span>Completed: <b id="completed">0</b></span>
    </div>

    <div class="input-box">
      <!-- ✅ UPDATED IDs -->
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="Add a new task...">
        <button type="submit">Add Task</button>
      </form>
    </div>

    <!-- ✅ UPDATED ID -->
    <ul id="todo-list"></ul>

    <!-- ✅ FILTER BUTTONS (NEW - Week 7 requirement) -->
    <div class="filters">
      <button id="filter-all">All</button>
      <button id="filter-active">Active</button>
      <button id="filter-completed">Completed</button>
    </div>

    <!-- ✅ KEEP THIS -->
    <button class="clear-btn" id="clear-completed">Clear Completed</button>
  </div>

  <!-- ✅ VERY IMPORTANT -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
